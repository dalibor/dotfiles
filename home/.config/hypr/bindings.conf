# Application bindings
bindd = SUPER ALT, RETURN, Tmux, exec, uwsm-app -- xdg-terminal-exec --dir="$(omarchy-cmd-terminal-cwd)" tmux new
bindd = SUPER, RETURN, Terminal, exec, uwsm-app -- xdg-terminal-exec --dir="$(omarchy-cmd-terminal-cwd)"
bindd = SUPER SHIFT, RETURN, Browser, exec, omarchy-launch-browser
bindd = SUPER SHIFT, F, File manager, exec, uwsm-app -- nautilus --new-window
bindd = SUPER ALT SHIFT, F, File manager (cwd), exec, uwsm-app -- nautilus --new-window "$(omarchy-cmd-terminal-cwd)"
bindd = SUPER SHIFT, B, Browser, exec, omarchy-launch-browser
bindd = SUPER SHIFT ALT, B, Browser (private), exec, omarchy-launch-browser --private
# bindd = SUPER SHIFT, M, Music, exec, omarchy-launch-or-focus spotify
bindd = SUPER SHIFT, M, YouTube Music, exec, omarchy-launch-webapp "https://music.youtube.com/"
bindd = SUPER SHIFT, N, Editor, exec, omarchy-launch-editor
# bindd = SUPER SHIFT, D, Docker, exec, omarchy-launch-tui lazydocker
bindd = SUPER SHIFT, V, Viber, exec, omarchy-launch-or-focus ^viber$ "flatpak run com.viber.Viber"
# bindd = SUPER SHIFT, O, Obsidian, exec, omarchy-launch-or-focus ^obsidian$ "uwsm-app -- obsidian -disable-gpu --enable-wayland-ime"
# bindd = SUPER SHIFT, W, Typora, exec, uwsm-app -- typora --enable-wayland-ime
# bindd = SUPER SHIFT, SLASH, Passwords, exec, uwsm-app -- 1password

# If your web app url contains #, type it as ## to prevent hyprland treating it as a comment
# bindd = SUPER SHIFT, A, ChatGPT, exec, omarchy-launch-webapp "https://chatgpt.com"
# bindd = SUPER SHIFT ALT, A, Grok, exec, omarchy-launch-webapp "https://grok.com"
# bindd = SUPER SHIFT, C, Calendar, exec, omarchy-launch-webapp "https://app.hey.com/calendar/weeks/"
#bindd = SUPER SHIFT, E, Email, exec, omarchy-launch-webapp "https://app.hey.com"
bindd = SUPER SHIFT, Y, YouTube, exec, omarchy-launch-webapp "https://youtube.com/"
# bindd = SUPER SHIFT ALT, G, WhatsApp, exec, omarchy-launch-or-focus-webapp WhatsApp "https://web.whatsapp.com/"
# bindd = SUPER SHIFT CTRL, G, Google Messages, exec, omarchy-launch-or-focus-webapp "Google Messages" "https://messages.google.com/web/conversations"
# bindd = SUPER SHIFT, P, Google Photos, exec, omarchy-launch-or-focus-webapp "Google Photos" "https://photos.google.com/"
# bindd = SUPER SHIFT, X, X, exec, omarchy-launch-webapp "https://x.com/"
# bindd = SUPER SHIFT ALT, X, X Post, exec, omarchy-launch-webapp "https://x.com/compose/post"

# New Tab
unbind = SUPER, T # bindd = SUPER, T, Toggle window floating/tiling, togglefloating,
bindd = SUPER, T, Browser new tab, sendshortcut, CTRL, T,
bindd = SUPER SHIFT, T, Toggle window floating/tiling, togglefloating,

# Close Tab
unbind = SUPER, W # bindd = SUPER, W, Close window, killactive,
bindd = SUPER, W, Browser close tab, sendshortcut, CTRL, W,

# Close window
bindd = SUPER, Q, Close window, killactive

# Next tab
unbind = SUPER, K # bindd = SUPER, K, Show key bindings, exec, omarchy-menu-keybindings
bindd = SUPER, K, Next Tab, sendshortcut, CTRL, TAB,
bindd = SUPER SHIFT, K, Show key bindings, exec, omarchy-menu-keybindings

# Prev tab
unbind = SUPER, J # bindd = SUPER, J, Toggle window split, layoutmsg, togglesplit
bindd = SUPER, J, Previous Tab, sendshortcut, CTRL SHIFT, TAB,
bindd = SUPER SHIFT, J, Toggle window split, layoutmsg, togglesplit

# bindd = SUPER, Z, Undo, sendshortcut, CTRL, Z,
# bindd = SUPER SHIFT, Z, Redo, sendshortcut, SHIFT CTRL, Z,
# bindd = SUPER, L, Browser Location focus, sendshortcut, CTRL, L,

# Select input text
bindd = SUPER, A, Browser Select Input Text, sendshortcut, CTRL, A,

# Scratchpad control
bindd = SUPER SHIFT, D, Move window to scratchpad, movetoworkspacesilent, special:scratchpad
bindd = SUPER, D, Toggle scratchpad, togglespecialworkspace, scratchpad
bindd = SUPER SHIFT ALT, D, Move window silently to workspace 10, movetoworkspacesilent, 10

# Switch between tabs
unbind = SUPER, code:10
unbind = SUPER, code:11
unbind = SUPER, code:12
unbind = SUPER, code:13
unbind = SUPER, code:14
unbind = SUPER, code:15
unbind = SUPER, code:16
unbind = SUPER, code:17
unbind = SUPER, code:18
unbind = SUPER, code:19
bindd = SUPER, code:10, Switch to tab 1, sendshortcut, ALT, 1,
bindd = SUPER, code:11, Switch to tab 2, sendshortcut, ALT, 2,
bindd = SUPER, code:12, Switch to tab 3, sendshortcut, ALT, 3,
bindd = SUPER, code:13, Switch to tab 4, sendshortcut, ALT, 4,
bindd = SUPER, code:14, Switch to tab 5, sendshortcut, ALT, 5,
bindd = SUPER, code:15, Switch to tab 6, sendshortcut, ALT, 6,
bindd = SUPER, code:16, Switch to tab 7, sendshortcut, ALT, 7,
bindd = SUPER, code:17, Switch to tab 8, sendshortcut, ALT, 8,
bindd = SUPER, code:18, Switch to tab 9, sendshortcut, ALT, 9,
bindd = SUPER, code:19, Switch to tab 10, sendshortcut, ALT, 10,

# Switch between workspaces
unbind = SUPER SHIFT, code:10
unbind = SUPER SHIFT, code:11
unbind = SUPER SHIFT, code:12
unbind = SUPER SHIFT, code:13
unbind = SUPER SHIFT, code:14
unbind = SUPER SHIFT, code:15
unbind = SUPER SHIFT, code:16
unbind = SUPER SHIFT, code:17
unbind = SUPER SHIFT, code:18
unbind = SUPER SHIFT, code:19
bindd = SUPER SHIFT, code:10, Switch to workspace 1, workspace, 1
bindd = SUPER SHIFT, code:11, Switch to workspace 2, workspace, 2
bindd = SUPER SHIFT, code:12, Switch to workspace 3, workspace, 3
bindd = SUPER SHIFT, code:13, Switch to workspace 4, workspace, 4
bindd = SUPER SHIFT, code:14, Switch to workspace 5, workspace, 5
bindd = SUPER SHIFT, code:15, Switch to workspace 6, workspace, 6
bindd = SUPER SHIFT, code:16, Switch to workspace 7, workspace, 7
bindd = SUPER SHIFT, code:17, Switch to workspace 8, workspace, 8
bindd = SUPER SHIFT, code:18, Switch to workspace 9, workspace, 9
bindd = SUPER SHIFT, code:19, Switch to workspace 10, workspace, 10

# Screenshots
bindd = SUPER, BRACKETLEFT, Screenshot with editing, exec, omarchy-cmd-screenshot
bindd = SUPER, BRACKETRIGHT, Screenshot to clipboard, exec, omarchy-cmd-screenshot smart clipboard
